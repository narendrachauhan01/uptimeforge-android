<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UptimeForge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0a1e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 320px; }
    .icon {
      width: 80px;
      height: 80px;
      background: #7c3aed;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #fff; }
    p  { font-size: 14px; color: #a78bfa; margin-bottom: 32px; line-height: 1.6; }
    button {
      background: #7c3aed;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:active { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>No Internet Connection</h1>
    <p>Please check your internet connection and try again. UptimeForge needs internet to monitor your sites.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
