name: Build UptimeForge APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Print debug keystore SHA-1 (for Google Sign-In setup)
        run: |
          echo "=== Finding keystore ==="
          find ~ -name "debug.keystore" 2>/dev/null || echo "keystore not found in home"
          find /root -name "debug.keystore" 2>/dev/null || true
          echo "=== SHA-1 Fingerprint ==="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>&1 | grep -i "sha1\|sha-1\|fingerprint" | head -5
          echo "=== From APK directly ==="
          keytool -printcert -jarfile android/app/build/outputs/apk/debug/app-debug.apk 2>&1 | grep -i "sha1\|sha-1" | head -3 || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: UptimeForge-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
